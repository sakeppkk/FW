<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>SSC LINE Login</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#0f172a;background:linear-gradient(180deg,#eef5ff,#f8fbff)}
    .card{width:min(92vw,420px);padding:28px;border-radius:24px;background:white;border:1px solid #dbe4f0;box-shadow:0 24px 60px rgba(15,23,42,.12);text-align:center}
    .mark{width:64px;height:64px;margin:0 auto 16px;border-radius:22px;display:grid;place-items:center;color:white;background:linear-gradient(135deg,#4f46e5,#2563eb);font-size:30px;font-weight:900}
    h1{margin:0 0 8px;font-size:24px}p{margin:0;color:#64748b;font-weight:650;line-height:1.55}.error{margin-top:16px;color:#e11d48;font-weight:750}.hint{margin-top:10px;font-size:13px;color:#94a3b8;word-break:break-word}
  </style>
</head>
<body>
  <main class="card">
    <div class="mark">S</div>
    <h1>Opening SSC</h1>
    <p id="status">กำลังเชื่อมต่อกับ LINE...</p>
    <div id="message" class="error"></div>
    <div id="debug" class="hint"></div>
  </main>

  <script>
    const LIFF_ID = "2010361502-ZX0DFcTv";
    const SSC_URL = "https://script.google.com/macros/s/AKfycbwSfaw2bgEOciLgC6ownFi90CkENWWgjrTxBRCNlLFxEzXqNWaft87X6Etvz2xdF4d-/exec";

    const statusEl = document.getElementById("status");
    const messageEl = document.getElementById("message");
    const debugEl = document.getElementById("debug");

    function setStatus(text){ statusEl.textContent = text || ""; }
    function setMessage(text){ messageEl.textContent = text || ""; }
    function setDebug(text){ debugEl.textContent = text || ""; }

    function buildSscUrl(profile){
      const url = new URL(SSC_URL);
      url.searchParams.set("source", "line-liff");
      url.searchParams.set("lineUserId", profile.userId || "");
      url.searchParams.set("lineDisplayName", profile.displayName || "");
      url.searchParams.set("lineProfileUrl", profile.pictureUrl || "");
      return url.toString();
    }

    async function main(){
      try{
        if (!window.liff) throw new Error("โหลด LIFF SDK ไม่สำเร็จ");

        await liff.init({ liffId: LIFF_ID });

        const inLine = liff.isInClient();
        const loggedIn = liff.isLoggedIn();
        setDebug("inLINE=" + inLine + " | loggedIn=" + loggedIn);

        // เปิดนอก LINE เช่น Chrome/มือถือ/คอม ให้ login ก่อน เป็นพฤติกรรมปกติ
        if (!loggedIn && !inLine) {
          setStatus("กำลังพาไปเข้าสู่ระบบ LINE...");
          liff.login({ redirectUri: window.location.href.split("#")[0] });
          return;
        }

        setStatus("ยืนยันโปรไฟล์สำเร็จ กำลังเปิด SSC...");
        const profile = await liff.getProfile();
        location.replace(buildSscUrl(profile));
      }catch(err){
        setStatus("เปิด SSC ไม่สำเร็จ");
        setMessage(err && err.message ? err.message : String(err));
      }
    }

    main();
  </script>
</body>
</html>
